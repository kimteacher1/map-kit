<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAP LAB 통합 런처</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        :root {
            /* 기본 파스텔 테마 (연분홍) */
            --bg-color: #FFF0F5;
            --box-color: #FFFFFF;
            --primary-color: #5DADE2;
            --text-color: #4A4A4A;
        }

        body { font-family: 'Jua', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; transition: background 0.5s; }

        .container { background: var(--box-color); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 500px; width: 90%; position: relative; z-index: 10; transition: 0.3s; box-sizing: border-box;}
        
        h1 { color: var(--primary-color); margin-bottom: 20px; }
        
        /* 테마 선택기 */
        .theme-picker { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .theme-btn { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .theme-btn:hover { transform: scale(1.2); }
        .theme-btn.active { border-color: var(--text-color); }

        /* 입력 폼 */
        .input-group { display: flex; flex-direction: column; gap: 15px; text-align: left; margin-bottom: 30px; width: 100%; box-sizing: border-box;}
        
        /* 글씨 가림 현상 해결: margin-bottom을 5px로 변경하여 간격 확보 */
        .input-group label { font-size: 1.1rem; color: #7F8C8D; margin-bottom: 5px; display: block; }
        
        .row-group { display: flex; gap: 10px; width: 100%; box-sizing: border-box;}
        .input-col { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        input, select { padding: 12px; border: 2px solid #E5E7E9; border-radius: 10px; font-family: 'Jua', sans-serif; font-size: 1.1rem; outline: none; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--primary-color); }

        .btn-submit { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.3rem; font-family: 'Jua', sans-serif; cursor: pointer; transition: 0.3s; width: 100%; box-sizing: border-box;}
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(93, 173, 226, 0.4); }

        /* 런처 메뉴 */
        #menu-screen { display: none; }
        .app-grid { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .app-card { background: #F8F9F9; border: 2px solid #E5E7E9; border-radius: 16px; padding: 30px 20px; cursor: pointer; transition: 0.3s; flex: 1; }
        .app-card:hover { border-color: var(--primary-color); background: #EBF5FB; transform: translateY(-5px); }
        .app-icon { font-size: 4rem; margin-bottom: 10px; }
        
        /* Iframe 컨테이너 */
        #app-container { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; background: white; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* 배움 한 줄 모달 */
        #lesson-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 400px; text-align: center; }
        .modal-content textarea { width: 90%; height: 80px; padding: 10px; border: 2px solid var(--primary-color); border-radius: 10px; font-family: 'Jua', sans-serif; font-size: 1.1rem; margin: 15px 0; resize: none;}
        
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.8); z-index: 10000; justify-content: center; align-items: center; font-size: 2rem; color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h1>🗺️ MAP LAB 교실 입장</h1>
        
        <div class="theme-picker">
            <div class="theme-btn active" style="background: #FFF0F5;" onclick="setTheme('#FFF0F5', this)"></div>
            <div class="theme-btn" style="background: #E8F8F5;" onclick="setTheme('#E8F8F5', this)"></div>
            <div class="theme-btn" style="background: #EBF5FB;" onclick="setTheme('#EBF5FB', this)"></div>
            <div class="theme-btn" style="background: #FEF9E7;" onclick="setTheme('#FEF9E7', this)"></div>
            <div class="theme-btn" style="background: #F4ECF7;" onclick="setTheme('#F4ECF7', this)"></div>
        </div>

        <div class="input-group">
            <label>소속 학교</label>
            <div class="row-group">
                <input type="text" id="school" value="" placeholder="학교명을 입력하세요" style="flex: 1;">
                <input type="text" value="초등학교" disabled style="background:#F0F3F4; max-width: 90px; text-align: center;">
            </div>
            
            <div class="row-group">
                <div class="input-col"><label>학년</label><select id="grade"><option value="6학년" selected>6학년</option><option value="5학년">5학년</option><option value="4학년">4학년</option></select></div>
                <div class="input-col"><label>반</label><input type="number" id="classNum" value="1" min="1"></div>
                <div class="input-col"><label>번호</label><input type="number" id="studentNum" placeholder="번호"></div>
            </div>

            <label>내 이름</label>
            <input type="text" id="studentName" placeholder="이름을 입력하세요">
        </div>

        <button class="btn-submit" onclick="login()">입장하기</button>
    </div>

    <div class="container" id="menu-screen">
        <h1 id="welcome-msg">환영합니다! 무엇을 할까요?</h1>
        <div class="app-grid">
            <div class="app-card" onclick="openApp('map1.html')">
                <div class="app-icon">📝</div>
                <h2>백지도 그리기</h2>
            </div>
            <div class="app-card" onclick="openApp('map2.html')">
                <div class="app-icon">💡</div>
                <h2>지도 겹치기</h2>
            </div>
        </div>
        <button class="btn-submit" style="margin-top: 20px; background: #95A5A6;" onclick="location.reload()">로그아웃</button>
    </div>

    <div id="app-container">
        <iframe id="app-frame" src=""></iframe>
    </div>

    <div id="lesson-modal">
        <div class="modal-content">
            <h2 style="color: var(--primary-color); margin-top:0;">✨ 오늘의 배움 한 줄</h2>
            <p style="color: #7F8C8D;">지도를 완성하며 알게 된 점이나<br>느낀 점을 한 문장으로 적어주세요!</p>
            <textarea id="lesson-text" placeholder="예: 우리 동네에는 공원이 참 많다는 것을 알았습니다."></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn-submit" style="background: #95A5A6;" onclick="document.getElementById('lesson-modal').style.display='none'">취소</button>
                <button class="btn-submit" onclick="submitData()">제출 및 저장</button>
            </div>
        </div>
    </div>

    <div id="loading-overlay">🚀 선생님의 구글 시트로 전송 중입니다...</div>

    <script>
        // ★★★ 여기에 복사해둔 웹 앱 URL을 붙여넣으세요! ★★★
        const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxl3tvWvw-0IJ7jtg19ysf-pL-wdg7_xuPxCwF4fL805lLolSMb72uO_ikMEA6lPbwO/exec";

        let studentData = {};
        let currentMapData = { base64: "", appName: "" };

        function setTheme(color, btn) {
            document.documentElement.style.setProperty('--bg-color', color);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function login() {
            let school = document.getElementById('school').value.trim();
            school = school.replace(/초등학교/g, '').trim(); 
            
            const grade = document.getElementById('grade').value;
            const classNum = document.getElementById('classNum').value.trim();
            const studentNum = document.getElementById('studentNum').value.trim();
            const name = document.getElementById('studentName').value.trim();

            if(!school || !classNum || !studentNum || !name) {
                alert("정보를 모두 입력해주세요!"); return;
            }

            studentData = { school, grade, classNum, studentNum, name };
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('welcome-msg').innerText = `${name} 학생, 반가워요!`;
        }

        function openApp(url) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('app-frame').src = url;
        }

        window.closeApp = function() {
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('app-frame').src = "";
        };

        window.handleMapSave = function(base64data, appName) {
            currentMapData.base64 = base64data;
            currentMapData.appName = appName;
            document.getElementById('lesson-text').value = "";
            document.getElementById('lesson-modal').style.display = 'flex';
        };

        function submitData() {
            const lessonText = document.getElementById('lesson-text').value.trim();
            if(!lessonText) { alert("배움 한 줄을 꼭 적어주세요!"); return; }

            document.getElementById('lesson-modal').style.display = 'none';
            document.getElementById('loading-overlay').style.display = 'flex';

            const payload = {
                ...studentData,
                program: currentMapData.appName,
                lessonText: lessonText,
                imageBase64: currentMapData.base64
            };

            fetch(GOOGLE_WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading-overlay').style.display = 'none';
                if(data.status === 'success') {
                    alert("✅ 선생님께 데이터가 성공적으로 전송되었습니다!\n학생 PC에도 이미지가 곧 저장됩니다.");
                    const a = document.createElement('a');
                    a.href = currentMapData.base64;
                    a.download = `MAP_LAB_${studentData.name}_${currentMapData.appName}.jpg`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                } else {
                    alert("⚠️ 전송 중 오류가 발생했습니다. 선생님께 문의하세요.");
                }
            })
            .catch(error => {
                document.getElementById('loading-overlay').style.display = 'none';
                alert("⚠️ 네트워크 오류가 발생했습니다.");
            });
        }
    </script>
</body>
</html>
